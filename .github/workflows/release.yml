name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Fetch bundled extensions
        run: ./scripts/fetch-extensions.sh

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp app/build/outputs/apk/release/app-release.apk "QStarem-${VERSION}-release.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: QStarem-*-release.apk
          generate_release_notes: true
          body: |
            ## QStarem ${{ github.ref_name }}

            Native Android browser shell for [Z-Stream](https://zstream.mov) with bundled **P-Stream** and ad blocking.

            ### Install

            1. Download `QStarem-*-release.apk` below.
            2. Allow installation from your browser or file manager if prompted.
            3. Open QStarem — default home is [zstream.mov](https://zstream.mov).

            ### Bundled extensions

            - P-Stream (extra sources)
            - uBlock Origin or AdGuard (settings)

            ### Desktop

            See [QStarem Universal](https://github.com/perlytiara/QStarem-Universal) for macOS, Linux, and Windows.
