name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Fetch bundled extensions
        run: ./scripts/fetch-extensions.sh

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp app/build/outputs/apk/release/app-release.apk "QStarem-${VERSION}-release.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: QStarem-*-release.apk
          generate_release_notes: true
          body: |
            ## QStarem ${{ github.ref_name }}

            Native Android browser shell for [Z-Stream](https://zstream.mov) with bundled **P-Stream** and ad blocking.

            ### What's new

            - **Q Play icon** — new default launcher icon and five alternate icons (Film Reel, Z Waves, Viewfinder, Orbital, Clapper)
            - **App settings in Z-Stream** — hamburger menu → **App settings** (home URL, ad blocker, P-Stream, icon picker)
            - **Media notification** — lock-screen controls and poster art when the app is backgrounded
            - **Picture-in-Picture** — swipe up or press Home while playing
            - **Return to browse** — exit player from the site hamburger menu
            - **Scroll fixes** — one-finger page scroll restored (edge-only gesture zones)

            ### Install

            1. Download `QStarem-*-release.apk` below.
            2. Allow installation from your browser or file manager if prompted.
            3. Open QStarem — default home is [zstream.mov](https://zstream.mov).

            ### Change app icon

            Z-Stream hamburger menu → **App settings** → pick an icon → **Save**.

            ### Desktop

            See [QStarem Universal](https://github.com/perlytiara/QStarem-Universal) for macOS, Linux, and Windows.
